name: Build APK and root module (and create nightly release)

on:
  push:
    branches:
      - '*'
    paths:
      - 'android/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a nightly release'
        required: true
        type: boolean
        default: false
      custom_notes:
        description: 'Custom updates to add to What''s Changed section'
        required: false
        type: string
  workflow_call:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew assembleApi100Debug assembleApi101Debug
        working-directory: android
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Debug APK
          path: android/app/build/outputs/apk/**/*.apk
  nightly-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release-nightly' || github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    needs: build-debug-apk
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Export SHA short name
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
      - name: Collect and rename APK files
        run: |
          shopt -s globstar nullglob
          APKS=(./Debug\ APK/**/*.apk)
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "No APK files found in artifact output"
            exit 1
          fi

          : > renamed_apks.txt
          for apk in "${APKS[@]}"; do
            base="$(basename "$apk")"
            if [[ "$base" == *"api100"* ]]; then
              out="LibrePods-${SHA_SHORT}-api100.apk"
            elif [[ "$base" == *"api101"* ]]; then
              out="LibrePods-${SHA_SHORT}-api101.apk"
            else
              out="LibrePods-${SHA_SHORT}-${base}"
            fi

            cp "$apk" "./$out"
            echo "./$out" >> renamed_apks.txt
          done
      - name: Decode keystore file
        run: echo "${{ secrets.DEBUG_KEYSTORE_FILE }}" | base64 --decode > debug.keystore
      - name: Install apksigner
        run: sudo apt-get update && sudo apt-get install -y apksigner
      - name: Sign APKs
        run: |
          while IFS= read -r apk; do
            apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android "$apk"
          done < renamed_apks.txt
      - name: Verify APKs
        run: |
          while IFS= read -r apk; do
            apksigner verify "$apk"
          done < renamed_apks.txt
      - name: Fetch the latest non-nightly release tag
        id: fetch-tag
        run: echo "::set-output name=tag::$(git describe --tags $(git rev-list --tags --max-count=1))"
      - name: Retrieve commits since the last release
        id: get-commits
        run: |
          COMMITS=$(git log ${{ steps.fetch-tag.outputs.tag }}..HEAD --pretty=format:"- %s (%h)" --abbrev-commit)
          echo "::set-output name=commits::${COMMITS}"
      - name: Prepare release notes
        id: release-notes
        run: |
          # Create a temporary file for release notes
          NOTES_FILE=$(mktemp)
          
          # Process custom notes if they exist
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.custom_notes }}" ]; then
            CUSTOM_NOTES="${{ github.event.inputs.custom_notes }}"
            
            # Check if custom notes already have bullet points or GitHub-style formatting
            if echo "$CUSTOM_NOTES" | grep -q "^\*\|^- \|http.*commit\|in #[0-9]\+"; then
              # Already formatted, use as is
              echo "$CUSTOM_NOTES" > "$NOTES_FILE"
            else
              # Add bullet point formatting
              echo "- $CUSTOM_NOTES" > "$NOTES_FILE"
            fi
          fi
          
          echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT
      - name: Zip root-module directory
        run: sh ./build-magisk-module.sh
      - name: Delete release if exist then create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t APKS < renamed_apks.txt
          gh release view "nightly" && gh release delete "nightly" -y --cleanup-tag
          gh release create "nightly" "${APKS[@]}" "./btl2capfix.zip" -p -t "Nightly Release" --notes-file "${{ steps.release-notes.outputs.notes_file }}" --generate-notes
